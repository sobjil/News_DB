name: Build Wordcloud (Daily)

# GDI-Apps WeeklyBrief 의 "최근 한 달간의 주요 이슈" 워드클라우드 데이터 빌드.
# 매일 KST 자정 (UTC 15:00) cron 자동 실행.
# data/articles.json 의 30일치 기사를 kiwipiepy 로 형태소 분석 → data/wordcloud.json 생성.
# 수동 트리거도 가능 (Actions 탭 [Run workflow] 또는 GH API workflow_dispatch).

on:
  schedule:
    - cron: '0 15 * * *'   # UTC 15:00 = KST 자정 (매일)
  workflow_dispatch: {}    # 수동 트리거

permissions:
  contents: write          # data/wordcloud.json auto-commit 위해 필요

concurrency:
  group: build-wordcloud
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install kiwipiepy (한국어 형태소 분석)
        run: |
          pip install --upgrade pip
          pip install kiwipiepy

      - name: Build wordcloud.json
        run: python .github/scripts/build_wordcloud.py

      - name: Commit & push wordcloud.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wordcloud.json
          if git diff --cached --quiet; then
            echo "변경 없음 — commit skip"
            exit 0
          fi
          GEN=$(python -c "import json; print(json.load(open('data/wordcloud.json','r',encoding='utf-8'))['generated'])")
          TOT=$(python -c "import json; print(json.load(open('data/wordcloud.json','r',encoding='utf-8'))['totalArticles'])")
          git commit -m "chore(wordcloud): daily build — ${TOT}건 (${GEN})"
          git push
