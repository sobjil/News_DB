name: Build Wordcloud (Hourly)

# GDI-Apps WeeklyBrief 의 "최근 한 달간의 주요 이슈" 워드클라우드 데이터 빌드.
# 매시간 33분 cron 자동 실행 (다른 cron 과 분산).
# data/articles.json 의 30일치 기사를 kiwipiepy 로 형태소 분석 → data/wordcloud.json 생성.
# 변경 없으면 commit skip (idempotent).
# 수동 트리거도 가능 (Actions 탭 [Run workflow] 또는 GH API workflow_dispatch).

on:
  schedule:
    - cron: '33 * * * *'   # 매시간 33분 (crawl 매 10분 + backup 매시간 17분 과 분산)
  workflow_dispatch: {}    # 수동 트리거
  # 안전망: news-crawl push 시점에 wordcloud 도 자동 trigger (articles.json 변경 시점 즉시 반영)
  workflow_run:
    workflows: ["Crawl Korea.kr Press Releases"]
    types: [completed]
    branches: [main]

permissions:
  contents: write          # data/wordcloud.json auto-commit 위해 필요

concurrency:
  group: build-wordcloud
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # workflow_run trigger 시 정상 완료된 경우만 실행 (실패한 crawl 다음 build 방지)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'   # pip 캐시 — kiwipiepy 재설치 시간 단축

      - name: Install kiwipiepy (한국어 형태소 분석)
        run: |
          pip install --upgrade pip
          pip install kiwipiepy

      - name: Build wordcloud.json
        run: python .github/scripts/build_wordcloud.py

      - name: Commit & push wordcloud.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wordcloud.json
          if git diff --cached --quiet; then
            echo "변경 없음 — commit skip"
            exit 0
          fi
          GEN=$(python -c "import json; print(json.load(open('data/wordcloud.json','r',encoding='utf-8'))['generated'])")
          TOT=$(python -c "import json; print(json.load(open('data/wordcloud.json','r',encoding='utf-8'))['totalArticles'])")
          git commit -m "chore(wordcloud): hourly build — ${TOT}건 (${GEN})"
          # race condition 회피 (다른 cron 과 동시 push 시)
          git pull --rebase
          git push
