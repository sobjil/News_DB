name: Build Wordcloud

# GDI-Apps WeeklyBrief 의 "최근 한 달간의 주요 이슈" 워드클라우드 데이터 빌드.
# data/articles.json 의 30일치 기사를 kiwipiepy 로 형태소 분석 → data/wordcloud.json 생성.
#
# 트리거: GHA schedule 하루 2회 — KST 12:00·00:00 (UTC 03:00·15:00).
#   ★ Gemini 키 사용량 절감 위해 하루 2회로 제한(2026-06-17, 사용자 요청). 매시간 server.js 트리거 폐지.
#   GHA cron 은 재배포·재시작에 영향받지 않아 정확히 하루 2회만 실행됨(서버 setInterval 의 부팅 재실행 문제 X).
# 수동 트리거: Actions 탭 [Run workflow].

on:
  schedule:
    - cron: '0 3,15 * * *'   # UTC 03:00·15:00 = KST 12:00·00:00 (하루 2회)
  workflow_dispatch: {}      # 수동 트리거

permissions:
  contents: write          # data/wordcloud.json auto-commit 위해 필요

concurrency:
  group: build-wordcloud
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install kiwipiepy (한국어 형태소 분석)
        run: |
          pip install --upgrade pip
          pip install kiwipiepy

      - name: Build wordcloud.json
        env:
          # ★ Gemini 의미 선별(A) — 멀티키 리볼빙. 줄바꿈/콤마로 키 여러 개 등록 권장.
          #   미설정 시 자동 폴백(확장 불용어 + keyness)이라 빌드는 깨지지 않음.
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/build_wordcloud.py

      - name: Commit & push wordcloud.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wordcloud.json
          if git diff --cached --quiet; then
            echo "변경 없음 — commit skip"
            exit 0
          fi
          GEN=$(python -c "import json; print(json.load(open('data/wordcloud.json','r',encoding='utf-8'))['generated'])")
          TOT=$(python -c "import json; print(json.load(open('data/wordcloud.json','r',encoding='utf-8'))['totalArticles'])")
          git commit -m "chore(wordcloud): hourly build — ${TOT}건 (${GEN})"
          # race condition 회피 (다른 cron 과 동시 push 시)
          git pull --rebase
          git push
