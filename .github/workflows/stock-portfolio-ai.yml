name: stock-portfolio-ai-report

# 개인 주식 포트폴리오 AI 리포트 생성 — private repo(sobjil/Stock-Portfolio)를 받아 실행 후 되돌려 쓴다.
# News_DB 는 public repo 라 Actions 무제한 무료. 데이터는 public 에 올라가지 않는다.
# 이 파일은 sobjil/News_DB 저장소의 .github/workflows/stock-portfolio-ai.yml 에 둔다.
# 필요 시크릿(News_DB 저장소): STOCK_PORTFOLIO_PAT, GEMINI_API_KEYS (+ FINNHUB_TOKEN 선택)
#   ai-reports.mjs(private repo)가 GEMINI_API_KEYS 를 직접 읽음(번호 키·단일 키 폴백 내장).
# 트리거: AISpace(항상 켜진 server.js)가 workflow_dispatch 로 정시 호출(지연 X). schedule cron 미사용.
#   - mode=us_portfolio : KST 07:00 (미국 종목 리포트 + 포트폴리오/주간/월간). 화~토(스크립트가 일·월 휴장 판단)
#   - mode=krhk         : KST 19:00 (한국·홍콩 종목 리포트). 월~금(스크립트가 토·일 휴장 판단)
#   ai-reports.mjs 가 모드별 idempotent 처리(오늘 이미 실행 시 스킵).
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "us_portfolio(미국+포트폴리오) / krhk(한국·홍콩) / all"
        type: string
        default: us_portfolio
      dry_run:
        description: "수집 데이터만 출력(Gemini 호출 X)"
        type: boolean
        default: false

concurrency:
  group: stock-portfolio-ai-report
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Guard
        id: guard
        env:
          PAT: ${{ secrets.STOCK_PORTFOLIO_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "STOCK_PORTFOLIO_PAT 미설정 — 건너뜀"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Stock-Portfolio (private)
        if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          repository: sobjil/Stock-Portfolio
          token: ${{ secrets.STOCK_PORTFOLIO_PAT }}
          path: sp
          fetch-depth: 0

      - name: Setup Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate AI reports
        if: steps.guard.outputs.ready == 'true'
        working-directory: sp
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
          AI_DRY_RUN: ${{ inputs.dry_run }}
          AI_MODE: ${{ inputs.mode }}
        run: node scripts/ai-reports.mjs

      - name: Commit & push back
        if: steps.guard.outputs.ready == 'true'
        working-directory: sp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain data)" ]; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git add data
          git commit -m "chore: AI report $(date -u +%Y-%m-%dT%H:%MZ)"
          # 원격 main 이 앞서 있으면(스냅샷 cron·내 코드 push) push 거부 → 최신 받아 rebase 후 재시도
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "push 성공 (시도 $i)"
              exit 0
            fi
            echo "push 거부 — pull --rebase 후 재시도 ($i/5)"
            git pull --rebase origin main || true
          done
          echo "push 5회 실패" >&2
          exit 1
