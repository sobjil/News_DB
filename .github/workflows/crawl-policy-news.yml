name: Crawl Korea.kr Press Releases

# 트리거(2026-06-06): 종전 GitHub schedule(*/10) + AISpace(30분) 이중 트리거 →
#   run 들이 겹쳐서 (a) korea.kr 502 버스트(동시 다발 요청 throttle) (b) push 충돌
#   (non-fast-forward) 빈발. → schedule 제거하고 AISpace(항상 켜짐, server.js)가
#   15분마다 단독 트리거. cancel-in-progress:false + run 3~4분 → 겹침 X = 충돌 X.
#   실제 변경 있을 때만 commit (idempotent). 수동 실행도 가능([Run workflow]).
on:
  workflow_dispatch: {}      # 수동 + AISpace workflow_dispatch 트리거

permissions:
  contents: write           # data/articles.json auto-commit 위해 필요

concurrency:
  group: crawl-policy-news
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 자동 commit 후 push 위해 token persist
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run korea.kr crawler
        # korea.kr 은 GitHub 미국 IP 를 SSL handshake timeout 으로 막는다.
        # AISpace(한국 IP) 프록시 경유로 우회 — KOREA_PROXY_URL 은 공개 URL(비밀 X),
        # KOREA_PROXY_KEY 는 선택(설정 시 프록시 인증, 미설정이면 allowlist 만으로 동작).
        env:
          KOREA_PROXY_URL: https://sobjil-gdi-apps.mycafe24.ai/api/proxy/korea
          KOREA_PROXY_KEY: ${{ secrets.KOREA_PROXY_KEY }}
        run: python .github/scripts/crawl_korea_kr.py

      - name: Commit & push articles.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          if git diff --cached --quiet; then
            echo "변경 없음 — commit skip"
            exit 0
          fi
          COUNT=$(python -c "import json; print(json.load(open('data/articles.json','r',encoding='utf-8'))['count'])")
          git commit -m "chore(crawl): articles.json 자동 갱신 — ${COUNT}건 (UTC $(date -u +%Y-%m-%dT%H:%MZ))"
          # 만약 다른 push(스냅샷/AI 워크플로 등)가 먼저 들어와 non-fast-forward 면 최신 받아
          # rebase(생성 파일은 ours 우선) 후 재시도. 단독 트리거라 충돌은 드물지만 안전망.
          for i in 1 2 3 4 5; do
            if git push; then echo "push 성공 (시도 $i)"; exit 0; fi
            echo "push 거부 — pull --rebase(ours) 후 재시도 ($i/5)"
            git pull --rebase -X ours origin main || true
          done
          echo "push 5회 실패" >&2
          exit 1
